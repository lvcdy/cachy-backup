[mgr]
ratio = [1,4,3]
sort_by ="extension"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "btime"
show_hidden = true
show_symlink = true

[opener]
edit = [
  { run = 'nvim "$@"', block = true, desc = "Neovim", for = "linux" },
]

[preview]
wrap = "yes"
image_filter = "lanczos3"

[plugin]
  prepend_preloaders = [
    { mime = "{audio,video,image}/*", run = "mediainfo" },
    { mime = "application/subrip", run = "mediainfo" },
    { mime = "application/postscript", run = "mediainfo" },
    { url = "/run/user/1000/gvfs/**/*", run = "noop" },
    { url = "/run/media/USER_NAME/**/*", run = "noop" },
    { url = "*.{csv,tsv,json,parquet,txt,xlsx}", run = "duckdb", multi = false }
  ]
  prepend_previewers = [
    { mime = "{audio,video,image}/*", run = "mediainfo"},
    { mime = "application/subrip", run = "mediainfo" },
    { mime = "application/postscript", run = "mediainfo" },
    { url = "*/", run = "folder" },
    { url = "/run/user/1000/gvfs/**/*", run = "noop" },
    { url = "/run/media/USER_NAME/**/*", run = "noop" },
    { url = "*.{csv,tsv,json,parquet,txt,xlsx}", run = "duckdb" },
    { url = "*.{db,duckdb}", run = "duckdb" },
  ]
[tasks]
  image_alloc      = 1073741824        # = 1024*1024*1024 = 1024MB

